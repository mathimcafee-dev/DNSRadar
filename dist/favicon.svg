  <line x1="16" y1="25" x2="16" y2="27" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="5" y1="16" x2="7" y2="16" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="25" y1="16" x2="27" y2="16" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
